<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVED</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="blob purple-blob"></div>
    <div class="blob orange-blob"></div>

    <nav class="top-nav glass">
        <div class="nav-buttons">
            <button class="icon-btn"><i class="fas fa-bars"></i></button>
            <button class="icon-btn active"><i class="fas fa-home"></i></button>
            <button class="icon-btn"><i class="fas fa-compass"></i></button>
        </div>
        <div class="nav-profile">
            <button class="icon-btn"><i class="fas fa-user"></i></button>
        </div>
    </nav>

    <main class="container">
        <div class="prompt-wrapper" id="prompt-wrapper">
            <!-- Feeling input -->
            <div class="prompt-box glass mini-prompt" id="feeling-box">
                <span class="prompt-label">How are you feeling today?</span>
                <textarea id="feeling-input" placeholder="e.g. tired, anxious, motivated…" rows="1"></textarea>
            </div>

            <!-- Task input -->
            <div class="prompt-box glass" id="tilt-box">
                <div class="prompt-top">
                    <span class="prompt-label">What are we up to?</span>
                </div>
                <textarea id="task-input" placeholder="Describe your task…" rows="1"></textarea>
                <div class="prompt-actions">
                    <button class="action-btn"><i class="fas fa-microphone"></i></button>
                    <button class="action-btn"><i class="fas fa-paperclip"></i></button>
                    <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="results" class="glass" style="display:none;">
            <div class="results-header">
                <div id="energy-badge" class="energy-badge"></div>
                <button id="add-task-btn" class="add-task-btn"><i class="fas fa-plus"></i> Add task</button>
            </div>
            <ul id="task-list"></ul>
            <div class="results-footer">
                <span id="points-total" class="points-total">🏆 0 pts</span>
                <button id="back-btn" class="back-btn"><i class="fas fa-arrow-left"></i> Start over</button>
            </div>
        </div>
    </main>

    <div class="active-users glass">
        <span id="user-count">12,480</span> active users
        <div class="status-dot"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
