<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVED — Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="blob purple-blob"></div>
    <div class="blob orange-blob"></div>

    <nav class="top-nav glass">
        <div class="nav-buttons">
            <a href="index.html" class="icon-btn" title="Back to home"><i class="fas fa-arrow-left"></i></a>
        </div>
        <div id="account" class="nav-profile">
            <button class="icon-btn" id="account-btn"><i class="fas fa-user"></i></button>
        </div>
    </nav>

    <main class="account-container" id="account-container">
        <!-- AUTH GUARD: shown while loading -->
        <div id="loading-state" class="account-loading">
            <div class="loading-spinner"></div>
        </div>

        <!-- NOT LOGGED IN -->
        <div id="unauth-state" class="account-unauth" style="display:none;">
            <div class="unauth-icon"><i class="fas fa-user-lock"></i></div>
            <h2>Sign in to view your profile</h2>
            <p>Your task history and stats are saved to your account.</p>
            <a href="index.html" class="back-home-btn"><i class="fas fa-arrow-left"></i> Back to DAVED</a>
        </div>

        <!-- PROFILE CONTENT -->
        <div id="profile-content" style="display:none;">

            <!-- Hero header -->
            <div class="profile-hero glass">
                <div class="profile-avatar" id="profile-avatar"><i class="fas fa-user"></i></div>
                <div class="profile-hero-info">
                    <h1 class="profile-name" id="profile-name">–</h1>
                    <p class="profile-email" id="profile-email">–</p>
                    <p class="profile-joined" id="profile-joined">–</p>
                </div>
                <a href="index.html" class="new-task-btn">
                    <i class="fas fa-plus"></i> New Task
                </a>
            </div>

            <!-- Stats grid -->
            <div class="stats-grid">
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(0,102,255,0.1);color:#0066ff;">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <div class="stat-value" id="stat-sessions">–</div>
                    <div class="stat-label">Total Sessions</div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(34,197,94,0.1);color:#16a34a;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-value" id="stat-steps">–</div>
                    <div class="stat-label">Steps Completed</div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(234,179,8,0.1);color:#ca8a04;">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="stat-value" id="stat-points">–</div>
                    <div class="stat-label">Points Earned</div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(168,85,247,0.1);color:#9333ea;">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <div class="stat-value" id="stat-completed">–</div>
                    <div class="stat-label">Sessions Finished</div>
                </div>
            </div>

            <!-- Task history -->
            <div class="history-section">
                <div class="history-header">
                    <h2 class="history-title">Task History</h2>
                    <div class="history-filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="done">Completed</button>
                        <button class="filter-btn" data-filter="in-progress">In Progress</button>
                    </div>
                </div>

                <div id="history-list" class="history-list"></div>

                <!-- Empty state -->
                <div id="history-empty" class="history-empty" style="display:none;">
                    <div class="empty-icon">🧩</div>
                    <h3>No tasks yet</h3>
                    <p>Decompose your first task to see it here.</p>
                    <a href="index.html" class="new-task-btn">Get started</a>
                </div>

                <!-- Pagination -->
                <div class="history-pagination" id="pagination" style="display:none;">
                    <button id="prev-page" class="page-btn" disabled>
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <span id="page-indicator" class="page-indicator">Page 1</span>
                    <button id="next-page" class="page-btn">
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script src="auth.js"></script>
    <script src="account.js"></script>
</body>
</html>
